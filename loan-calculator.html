<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loan Repayment Calculator Nigeria</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }
    small {
      color: #555;
      display: block;
      margin-top: 5px;
    }
    .presets button {
      width: 32%;
      margin-top: 5px;
      padding: 8px;
      font-size: 12px;
      cursor: pointer;
      border: none;
      background: #ddd;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>Loan Repayment Calculator</h2>
  <label>Loan Amount (₦)</label>
  <input type="number" id="amount" placeholder="e.g 50000">
  <label>Interest Rate (%)</label>
  <input type="number" id="rate" placeholder="e.g 10">
  <small>10% means you pay ₦10 extra for every ₦100 borrowed</small>
  <div class="presets">
    <button onclick="setRate(5)">Low (5%)</button>
    <button onclick="setRate(15)">Normal (15%)</button>
    <button onclick="setRate(30)">High (30%)</button>
  </div>
  <label>Duration (Months)</label>
  <input type="number" id="months" placeholder="e.g 6">
  <button onclick="calculateLoan()">Calculate</button>
  <div id="result"></div>
  <p><a href="index.html">🏠 Explore All Tools</a></p>
</div>
<script>
function setRate(value) {
  document.getElementById("rate").value = value;
}
function calculateLoan() {
  const amount = document.getElementById("amount").value;
  const rateInput = document.getElementById("rate").value;
  const months = document.getElementById("months").value;
  if (!amount || !rateInput || !months) {
    alert("Please fill all fields");
    return;
  }
  const rate = rateInput / 100;
  const totalInterest = amount * rate;
  const totalRepayment = Number(amount) + totalInterest;
  const monthlyPayment = totalRepayment / months;
  document.getElementById("result").innerHTML = `
    <p><strong>Monthly Payment:</strong> ₦${Number(monthlyPayment).toLocaleString()}</p>
    <p><strong>Total Repayment:</strong> ₦${Number(totalRepayment).toLocaleString()}</p>
    <p><strong>Total Interest:</strong> ₦${Number(totalInterest).toLocaleString()}</p>
    <small>This is an estimate. Real loan terms may vary (usually higher).</small>
  `;
}
</script>
</body>
</html>
