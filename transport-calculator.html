<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transport Fare Estimator Nigeria - SabiCalc</title>
  <meta name="description" content="Estimate transport fares in Nigeria based on distance and transport type. Plan trips easily.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
<div class="container">
  <h1>Transport Fare Estimator Nigeria</h1>
  <h2>Transport Calculator</h2>
  <p>Estimate transport cost based on distance.</p>
  <label>Distance</label>
  <input type="number" id="distance">
  <label>Type</label>
  <select id="type">
    <option value="50">Bus</option>
    <option value="80">Keke</option>
    <option value="100">Taxi</option>
  </select>
  <button onclick="calc()">Estimate</button>
  <div id="result"></div>
  <h2>Common Transport Questions</h2>
  <ul>
    <li>How much is transport in Lagos?</li>
    <li>Why do fares change?</li>
    <li>How do I budget transport?</li>
  </ul>
  <p><strong>Tip:</strong> Fuel price affects transport fares.</p>
  <p><a href="index.html">Home</a></p>
</div>
<script>
function calc() {
  const d = document.getElementById("distance").value;
  const t = document.getElementById("type").value;
  if (!d || !t) return alert("Fill all fields");
  const cost = d * t;
  document.getElementById("result").innerHTML =
    `<p>Estimated Fare: ₦${cost.toLocaleString()}</p>`;
}
</script>
</body>
</html>
