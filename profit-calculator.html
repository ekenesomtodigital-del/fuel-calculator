<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Side Hustle Profit Calculator Nigeria - SabiCalc</title>
  <meta name="description" content="Calculate profit from side hustles in Nigeria. Enter cost, price and quantity to see real business profit.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
<div class="container">
  <h1>Side Hustle Profit Calculator Nigeria</h1>
  <small>SabiCalc</small>
  <h2>Profit Calculator</h2>
  <p>Calculate business profit easily.</p>
  <label>Cost</label>
  <input type="number" id="cost">
  <label>Price</label>
  <input type="number" id="price">
  <label>Quantity</label>
  <input type="number" id="qty">
  <button onclick="calc()">Calculate</button>
  <div id="result"></div>
  <h2>Common Profit Questions</h2>
  <ul>
    <li>Am I actually making profit?</li>
    <li>How do I price products?</li>
    <li>What is my real income?</li>
  </ul>
  <p><strong>Tip:</strong> Always include hidden costs.</p>
  <p><a href="index.html">Home</a></p>
</div>
<script>
function calc() {
  const c = document.getElementById("cost").value;
  const p = document.getElementById("price").value;
  const q = document.getElementById("qty").value;
  if (!c || !p || !q) return alert("Fill all fields");
  const profit = (p - c) * q;
  document.getElementById("result").innerHTML =
    `<p><strong>Profit:</strong> ₦${profit.toLocaleString()}</p>`;
}
</script>
</body>
</html>
