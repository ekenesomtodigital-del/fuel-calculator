<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Side Hustle Profit Calculator Nigeria</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    h1{
      margin-bottom: 0;
    }
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
    small {
      color: #777;
      display: block;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>SabiCalc</h1>
  <small>Smart everyday calculators for Nigerians</small>
  <h2>Side Hustle Profit Calculator</h2>
  <label>Cost per Item (₦)</label>
  <input type="number" id="cost" placeholder="e.g 500">
  <label>Selling Price (₦)</label>
  <input type="number" id="price" placeholder="e.g 1000">
  <label>Number of Items Sold</label>
  <input type="number" id="quantity" placeholder="e.g 20">
  <button onclick="calculateProfit()">Calculate Profit</button>
  <div id="result"></div>
  <p><a href="index.html">🏠 Explore All Tools</a></p>
</div>
<script>
function calculateProfit() {
  const cost = document.getElementById("cost").value;
  const price = document.getElementById("price").value;
  const quantity = document.getElementById("quantity").value;
  if (!cost || !price || !quantity) {
    alert("Fill all fields");
    return;
  }
  const profitPerItem = price - cost;
  const totalProfit = profitPerItem * quantity;
  document.getElementById("result").innerHTML = `
    <p><strong>Profit per Item:</strong> ₦${Number(profitPerItem).toLocaleString()}</p>
    <p><strong>Total Profit:</strong> ₦${Number(totalProfit).toLocaleString()}</p>
    <small>If this looks low… now you know why you’re tired.</small>
  `;
}
</script>
</body>
</html>
