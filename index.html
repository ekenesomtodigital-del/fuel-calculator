<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Cost Calculator Nigeria</title>
    <style>
        body{
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }
        .container{
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        input, button{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button{
            background: #007bff;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Fuel Cost Calculator</h2>
    <input type="number" id="distance" placeholder="Distance(km)">
    <input type="number" id="consumption" placeholder="Fuel Consumption(km/l)">
    <input type="number" id="price" placeholder="Fuel Price(&#8358;/litre)">
    <button onclick="calculate()">Calculate</button>
    <div id="result"></div>
</div>
<script src="script.js"></script>
</body>
</html>
