<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fuel Cost Calculator Nigeria</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    small {
      color: #555;
      display: block;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>Fuel Cost Calculator</h2>
  <label>Distance (km)</label>
  <input type="number" id="distance" placeholder="Enter distance">
  <small>Example: Lagos to Ibadan ≈ 130km</small>
  <label>Select Vehicle Type</label>
  <select id="vehicle">
    <option value="">-- Choose Vehicle --</option>
    <option value="15">Small Car (e.g Corolla)</option>
    <option value="10">SUV</option>
    <option value="5">Bus</option>
  </select>
  <small>This will auto-fill fuel consumption</small>
  <label>Fuel Consumption (km/l)</label>
  <input type="number" id="consumption" placeholder="Or enter manually">
  <small>Most cars: 10–15 km/l</small>
  <label>Fuel Price (₦/litre)</label>
  <input type="number" id="price" placeholder="Enter fuel price">
  <small>Check current petrol price in your area</small>
  <button onclick="calculate()">Calculate</button>
  <div id="result"></div>
</div>
<p><a href="data-calculator.html">Try Data Bundle Calculator →</a></p>
<p><a href="electricity-calculator.html">Electricity Bill Estimator →</a></p>
<p><a href="salary-calculator.html">Salary → Daily Spending Calculator →</a></p>
<p><a href="loan-calculator.html">Loan Repayment Calculator →</a></p>
<script src="script.js"></script>
</body>
</html>
