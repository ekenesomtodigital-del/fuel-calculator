<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SabiCalc - Data Bundle Value Calculator Nigeria</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    h1{
      margin-bottom: 0;
    }
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
    small {
      color: #777;
      display: block;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>SabiCalc</h1>
  <small>Smart everyday calculators for Nigerians</small>
  <h2>Data Bundle Value Calculator</h2>
  <label>Bundle Price (₦)</label>
  <input type="number" id="price" placeholder="e.g 2000">
  <small>Enter how much the data costs</small>
  <label>Data Size (GB)</label>
  <input type="number" id="data" placeholder="e.g 5">
  <small>Enter the total GB you get</small>
  <button onclick="calculateData()">Calculate</button>
  <div id="result"></div>
</div>
<p><a href="index.html">🏠 Explore All Tools</a></p>
<script>
function calculateData() {
  const price = document.getElementById("price").value;
  const data = document.getElementById("data").value;
  if (!price || !data) {
    alert("Fill all fields");
    return;
  }
  const costPerGB = price / data;
  document.getElementById("result").innerHTML = `
    <p><strong>Cost per GB:</strong> ₦${costPerGB.toFixed(2)}</p>
    <small>Lower cost per GB = better value</small>
  `;
}
</script>
</body>
</html>
