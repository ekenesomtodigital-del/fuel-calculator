<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Electricity Bill Estimator Nigeria</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    select, input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: orange;
      color: white;
      border: none;
      cursor: pointer;
    }
    small {
      color: #555;
      display: block;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>Electricity Bill Estimator</h2>
  <label>Select Appliance</label>
  <select id="appliance">
    <option value="">-- Choose Appliance --</option>
    <option value="75">Fan</option>
    <option value="100">TV</option>
    <option value="200">Fridge</option>
    <option value="1500">AC</option>
    <option value="60">Light Bulb</option>
  </select>
  <small>We estimate power usage automatically</small>
  <label>How many of them do you use?</label>
  <input type="number" id="quantity" placeholder="e.g 2">
  <label>Hours used per day</label>
  <input type="number" id="hours" placeholder="e.g 5">
  <label>Number of days</label>
  <input type="number" id="days" placeholder="e.g 30">
  <label>Electricity rate (₦ per kWh)</label>
  <input type="number" id="rate" placeholder="Default: 100">
  <button onclick="calculate()">Calculate Bill</button>
  <div id="result"></div>
</div>
<p><a href="index.html">🏠 Explore All Tools</a></p>
<script>
function calculate() {
  const appliancePower = document.getElementById("appliance").value;
  const quantity = document.getElementById("quantity").value;
  const hours = document.getElementById("hours").value;
  const days = document.getElementById("days").value;
  const rate = document.getElementById("rate").value || 100;
  if (!appliancePower || !quantity || !hours || !days) {
    alert("Please fill all fields");
    return;
  }
  const totalWatts = appliancePower * quantity;
  const powerKW = totalWatts / 1000;
  const totalKWh = powerKW * hours * days;
  const totalCost = totalKWh * rate;
  document.getElementById("result").innerHTML = `
    <p><strong>Estimated Usage:</strong> ${totalKWh.toFixed(2)} kWh</p>
    <p><strong>Estimated Bill:</strong> ₦${Number(totalCost).toLocaleString()}</p>
    <small>Estimated cost based on your usage pattern.</small>
  `;
}
</script>
</body>
</html>
